apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fintech

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: YOUR_DOCKER_USERNAME/frontend:latest

          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: fintech

spec:
  selector:
    app: frontend

  ports:
    - port: 80

  type: ClusterIP
